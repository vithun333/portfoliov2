<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
@font-face{font-family:'Humanism';src:url('fonts/humanism-bolddemo.otf') format('opentype');font-weight:700;font-display:swap}
:root{--bg:#0f0f0f;--bg2:#161616;--ink:#f3f3f3;--muted:#8f8f8f;--accent:#FF6A00;--ease:cubic-bezier(.16,1,.3,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Satoshi','Inter',system-ui,sans-serif;font-weight:500;-webkit-font-smoothing:antialiased;line-height:1.5}
#app{opacity:0;transform:translateY(34px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
body.loaded #app{opacity:1;transform:none}
.heroimg img{will-change:transform;transform:scale(1.06)}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
@media (pointer:fine){*{cursor:none !important}}
.cursor-dot{position:fixed;top:0;left:0;width:14px;height:14px;border-radius:50%;background:var(--accent);pointer-events:none;z-index:9999;box-shadow:0 0 18px rgba(255,106,0,.6);transition:width .25s var(--ease),height .25s var(--ease)}
.cursor-dot.big{width:44px;height:44px;background:rgba(255,106,0,.2);border:1px solid var(--accent);box-shadow:none}
@media (pointer:coarse){.cursor-dot{display:none}}

#topnav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:22px 5vw}
#logo{font-family:'Humanism',sans-serif;font-weight:700;font-size:20px;letter-spacing:.04em;color:#fff}
#burger{background:none;border:none;width:34px;height:22px;display:flex;flex-direction:column;justify-content:space-between;transition:transform .65s cubic-bezier(.5,.1,.2,1)}
#burger.spin{transform:rotate(360deg)}
#burger span{display:block;height:2px;width:100%;background:#fff}
#menuPop{position:fixed;top:66px;right:5vw;z-index:320;background:#171717;border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:16px 30px 18px;min-width:240px;box-shadow:0 30px 70px rgba(0,0,0,.55);transform-origin:calc(100% - 6px) -16px;transform:scale(0);opacity:0;pointer-events:none;transition:transform .5s cubic-bezier(.34,1.6,.4,1),opacity .12s ease}
#menuPop.open{transform:none;opacity:1;pointer-events:auto}
#menuPop .ov-link{display:flex;align-items:baseline;gap:16px;font-family:'Humanism',sans-serif;font-weight:700;font-size:34px;line-height:1.3;color:#ececec;transition:color .2s,padding-left .25s var(--ease)}
#menuPop .ov-link em{font-style:normal;font-family:'Satoshi',sans-serif;font-size:13px;letter-spacing:.16em;color:var(--accent);width:24px;flex:none}
#menuPop .ov-link:hover{color:var(--accent);padding-left:6px}

.wrap{max-width:1180px;margin:0 auto;padding:0 5vw}
header.hero{padding:20vh 0 6vh}
.hero .back{display:inline-flex;gap:8px;align-items:center;font-size:13px;letter-spacing:.04em;color:var(--muted);margin-bottom:30px}
.hero h1{font-family:'Humanism',sans-serif;font-weight:700;font-size:clamp(44px,8vw,108px);line-height:.95;letter-spacing:-.01em;margin-bottom:22px}
.hero .tagline{font-size:clamp(18px,2.4vw,28px);font-weight:600;max-width:20em;color:#e8e8e8;line-height:1.3}
.count{font-family:'Humanism',sans-serif;color:var(--muted);font-size:16px;margin:40px 0 12px}

.heroimg{border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.07);box-shadow:0 40px 90px rgba(0,0,0,.5)}
.heroimg img{width:100%;height:auto}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:48px;padding:9vh 0 5vh}
.block .lbl{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;font-weight:700}
.block p{font-size:16px;line-height:1.7;color:#cdcdcd}

.overview{display:grid;grid-template-columns:1.6fr 1fr;gap:54px;padding:4vh 0 7vh;border-top:1px solid rgba(255,255,255,.08)}
.overview .body p{font-size:16px;line-height:1.75;color:#cdcdcd;margin-bottom:22px}
.overview .body p:first-child{font-size:19px;color:#fff;font-weight:600;line-height:1.5}
.linkbtn{display:inline-flex;align-items:center;gap:10px;margin-top:8px;padding:14px 24px;border-radius:40px;background:var(--accent);color:#0a0a0a;font-weight:700;font-size:14px;transition:transform .3s var(--ease)}
.linkbtn:hover{transform:translateX(4px)}
.meta{align-self:start;position:sticky;top:16vh}
.meta .row{padding:16px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.meta .row span{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.meta .row b{font-size:17px;font-weight:600}

/* scroll reveal */
.reveal{opacity:0;transform:translateY(40px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
.reveal.inview{opacity:1;transform:none}
.grid .block{opacity:0;transform:translateY(40px);transition:opacity .8s var(--ease),transform .8s var(--ease)}
.grid .block.inview{opacity:1;transform:none}
.grid .block:nth-child(2){transition-delay:.12s}
/* liquid gallery — sticky card that melts from one image to the next on scroll */
.gallery{position:relative;padding-bottom:9vh}
.gstick{position:sticky;top:0;height:100vh;display:flex;align-items:center;justify-content:center}
.gcard{position:relative;width:min(940px,90vw);aspect-ratio:16/10;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08);box-shadow:0 40px 90px rgba(0,0,0,.55);background:#1a1a1a}
.glayer{position:absolute;inset:0;will-change:clip-path}
.glayer img{width:100%;height:100%;object-fit:cover}
.gnum{position:absolute;top:16px;left:18px;font-family:'Humanism',sans-serif;font-size:16px;color:#fff;mix-blend-mode:difference;z-index:10}

.seealso{border-top:1px solid rgba(255,255,255,.08);padding:8vh 0}
.seealso h4{font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin-bottom:30px}
.seealso .row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.sa{border-radius:14px;overflow:hidden;position:relative;aspect-ratio:3/2;border:1px solid rgba(255,255,255,.07);background:#1d1d1d;box-shadow:0 18px 40px rgba(0,0,0,.4)}
.sa img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.sa:hover img{transform:scale(1.06)}
.sa .cap{position:absolute;left:14px;bottom:13px;right:14px;display:flex;justify-content:space-between;align-items:flex-end;gap:8px}
.sa .cap small{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#e8e8e8;background:rgba(0,0,0,.45);padding:4px 8px;border-radius:14px;white-space:nowrap}
.sa .cap b{font-weight:700;font-size:16px}

.contact{text-align:center;padding:12vh 5vw;border-top:1px solid rgba(255,255,255,.08)}
.contact p{font-family:'Humanism',sans-serif;font-size:clamp(24px,3.6vw,46px);line-height:1.2;max-width:16em;margin:0 auto 34px}
.contact a.cta{display:inline-flex;padding:16px 30px;border-radius:40px;background:var(--accent);color:#0a0a0a;font-weight:700}

@media (max-width:820px){.grid,.overview{grid-template-columns:1fr;gap:30px}.meta{position:static}.seealso .row{grid-template-columns:1fr 1fr}nav .links{display:none}}
</style>

<script>
const CASES=[
{ name:"tidbit", cat:"UI/UX Hackathon", color:"#F5821F",
  tagline:`A swipe-based recipe discovery and cooking experience designed to reduce decision fatigue and get users cooking faster — designed in 1 day.`,
  hero:"tb1.png", gallery:["tb2.png","tb34.png","tb56.png"],
  problem:`Many users experience friction when deciding what to cook due to overwhelming recipe content, lengthy instructions, and high cognitive effort before committing to a meal. Existing food and recipe platforms often prioritize information density over decision efficiency.`,
  solution:`tidbit explored a low-friction, swipe-based discovery model that allows users to browse recipes quickly and intuitively. The design prioritized rapid decision-making, simplified recipe presentation, and a clear progression from inspiration to action.`,
  body:[`tidbit was born out of a shared frustration with the overwhelming nature of modern recipe apps. Faced with endless scrolling, dense instructions, and decision fatigue, we envisioned a simpler way to move from inspiration to action. By reframing cooking as a quick, intuitive discovery experience, tidbit explores how thoughtful interaction design can make everyday decisions feel effortless.`,
    `As part of the tidbit hackathon project, I was responsible for designing the recipe detail and cooking experience, with a particular focus on how users transition from discovering a recipe to actively preparing it. I designed the recipe description page to present essential information such as ingredients, nutritional data, utensils, and AI-generated summaries in a structured and visually digestible format. The layout was intentionally organized to reduce cognitive load and help users quickly understand what they needed before starting.`,
    `I also conceptualized tidbit's core interaction: a step-by-step cooking interface that guides users through each instruction using vertical scrolling. Instead of presenting all instructions at once, each step appears as a full-screen immersive view with supporting imagery, allowing users to focus on one task at a time. This progressive disclosure approach transforms cooking into a more intuitive and engaging experience, similar to browsing short-form content, while minimizing distractions and making the learning process feel more approachable for beginner cooks.`,
    `Through this work, I explored how interaction design can simplify complex tasks and turn recipe instructions into a guided, user-centered experience. The project highlights my strengths in information architecture, interface design, and creating innovative interaction patterns that balance usability with visual appeal.`],
  meta:{Year:"2024",Timeframe:"1 day",Tools:"Figma",Category:"UI/UX Hackathon"},
  link:{label:"View the prototype",url:"https://www.figma.com/proto/yYFBcKCkSWOcsuwWP1xIzX/Hackathons-Design?node-id=87-506&starting-point-node-id=87%3A506"} },

{ name:"Vancouver Police Museum App", cat:"UI/UX", color:"#3B82F6",
  tagline:`Designing an accessibility-first museum experience grounded in real-world research and stakeholder collaboration.`,
  hero:"VPM1.png", gallery:["VPM2.png","VPM3.png","VPM4.png"],
  problem:`The Vancouver Police Museum sought to improve the accessibility and inclusivity of its visitor experience. Existing exhibit interactions and digital touchpoints did not adequately support users with varying accessibility needs, including visual, mobility, and cognitive differences. Additionally, any proposed solution needed to be realistic for implementation within the museum's operational and funding constraints.`,
  solution:`Our team conducted longitudinal, mixed-method user research over four months, including on-site observations, stakeholder interviews, and accessibility evaluations. Insights from this research informed the design of an accessible mobile app prototype that emphasized inclusive navigation, readable content hierarchies, and intuitive interaction patterns aligned with accessibility standards.`,
  body:[`This project emerged from the class IAT 333: Interaction Design Methods with close collaboration with the <a href="https://www.vancouverpolicemuseum.ca/" target="_blank" rel="noopener" style="color:var(--accent)">Vancouver Police Museum</a> and its visitors. Through months of on-site research and conversations with staff, we recognized how traditional museum experiences often exclude users with accessibility needs. This work set out to reimagine how digital tools could support inclusive storytelling while remaining realistic for a small, grant-funded institution.`,
    `This project was a research-driven UX design collaboration completed in close partnership with the Vancouver Police Museum and its staff. I contributed across the full design process, from research and synthesis to ideation, wireframing, and high-fidelity prototyping.`,
    `On the research side, I led a participatory design workshop with museum staff to better understand visitor needs, accessibility challenges, and opportunities for improving the on-site experience. Through collaborative ideation activities, we gathered insights directly from stakeholders and translated their expertise into actionable design requirements. This process helped ensure that the proposed solution addressed both user expectations and operational realities.`,
    `On the design side, I was responsible for creating several core screens of the mobile experience, including the Exhibition Description page, the My Visit page, and the QR Code page used to unlock contextual information throughout the museum. These interfaces were designed with a strong emphasis on accessibility, incorporating scalable typography, high-contrast visuals, and clear information hierarchy to reduce cognitive load and support a wide range of visitors.`,
    `The final outcome was a polished, implementation-ready prototype intended to enhance how visitors explore exhibits and plan their museum experience. This project demonstrates my ability to lead collaborative research activities and translate stakeholder insights into thoughtful, user-centered design solutions for a real-world organization.`],
  meta:{Year:"2025",Timeframe:"4 months",Tools:"Figma",Category:"UI/UX"},
  link:{label:"Watch the walkthrough",url:"https://www.youtube.com/watch?v=i3CqeT_Vx2Q"} },

{ name:"Zealty", cat:"UX Research", color:"#EC4899",
  tagline:`A research case study with suggested design choices to the design team of Zealty.`,
  hero:"Z1.png", gallery:["Z2.png","Z3.png","Zealty_SUS.png"],
  problem:`The evaluation revealed that Zealty's primary challenge was not a lack of functionality, but excessive information density that increased cognitive load. Across nearly all tasks, users required more time to complete workflows on Zealty compared to REW, particularly during complex filtering. Novice users were significantly slower even on simple tasks such as address search, suggesting difficulty interpreting the interface quickly. Unexpectedly, expert users also demonstrated high friction, committing significantly more errors on Zealty during navigation and filtering tasks. This indicated that Zealty diverged from industry-standard interaction patterns, disrupting professionals' established mental models. Satisfaction scores reinforced these findings: Zealty received a System Usability Scale score of 41.9 from novices (Grade F) and 56.6 from experts (Grade D), both falling well below the industry benchmark of 68 and far below REW's ~78 average. Qualitative feedback consistently described the interface as "busy," "crowded," and "overwhelming," revealing that visual overload and unclear filter hierarchy were core drivers of reduced efficiency, increased error rates, and diminished trust.`,
  solution:`Based on the synthesis of quantitative and qualitative findings, we proposed a focused redesign strategy centered on reducing cognitive load while preserving Zealty's strong data capabilities. First, we recommended reducing visual overload by simplifying the interface hierarchy, minimizing overlapping elements, grouping related controls, and prioritizing primary information over secondary details. Second, we proposed improving interaction consistency by aligning icons, behaviors, and navigation patterns with established real estate industry standards to restore predictability for expert users. Finally, we identified filtering as the largest usability bottleneck and recommended strengthening filter discoverability through clearer labeling, better grouping of criteria, visible highlighting of active filters, and stronger system feedback when changes are applied. These recommendations aim to transform Zealty from a dense but powerful interface into one that balances richness of information with clarity, efficiency, and user confidence.`,
  body:[`Completed as part of IAT 432: Design Evaluation, this project involved working directly with <a href="https://www.zealty.ca/" target="_blank" rel="noopener" style="color:var(--accent)">Zealty</a> to conduct an in-depth evaluation of their product and deliver research-backed design recommendations to improve the user experience.`,
    `As part of an advanced UX evaluation project, our team conducted a comprehensive comparative usability study of Zealty.ca's map interface, benchmarking it against REW.ca, a well-established competitor in the real estate market. The objective was to measure efficiency, effectiveness, and user satisfaction across both novice homebuyers and experienced real estate professionals. We recruited 16 participants (8 Novices and 8 Experts) and asked them to complete four high-frequency tasks, including address search, navigation and sorting, identifying key property details, and applying complex filters. The study combined heuristic evaluation using Nielsen's 10 Usability Heuristics, moderated usability testing, quantitative performance metrics (time-on-task, error rates, and System Usability Scale scores), and qualitative behavioral observations. By testing both platforms under identical conditions, we were able to isolate specific design decisions that contributed to performance gaps and usability friction.`,
    `My primary responsibility in this project was leading interviews with novice users and analyzing their behavioral data. I reviewed questionnaire responses and analyzed recorded session videos of participants completing tasks on both platforms. Through close observation of hesitation patterns, repeated actions, and verbal feedback, I identified themes related to cognitive overload, filter confusion, and uncertainty in navigation, which directly informed our final design recommendations to the design team.`,
    `Interested in the full research process behind this case study? Contact me to view the complete Zealty research paper.`],
  meta:{Year:"2025",Timeframe:"4 months",Tools:"Figma, Zoom, Google Forms",Category:"UX Research"},
  link:null },

{ name:"Echo of Motion", cat:"Wearable Interaction", color:"#EF4444",
  tagline:`Exploring wrist movement and delayed motion feedback through a wearable drawing interface.`,
  hero:"EOMD.png", gallery:["320-2.png","320-3.png","320-1.png"],
  problem:`The initial concept explored translating body motion into light and sound feedback using sensors and Arduino. While the idea successfully demonstrated a technical connection between movement and digital output, the experience felt too functional and product-oriented. The interaction focused on triggering visual and auditory responses rather than creating a meaningful artistic experience. During our presentation, feedback from our professor highlighted that the concept lacked depth in terms of embodied exploration and did not fully investigate how movement itself could become a creative and expressive medium.`,
  solution:`After discussing the project with our professor, we redefined the concept to focus on translating body movement into a drawing experience. Instead of producing simple light and sound outputs, hand gestures and motion now generate dynamic lines and shapes on a digital canvas. This shift transformed the project from a reactive system into an open-ended artistic experience where participants can visually express their movements in real time. To support this new direction, we modified the Arduino and Processing code so that motion data controlled drawing behavior such as line position, size, and flow. The final result better captures the principles of embodied interaction by allowing meaning and visual expression to emerge directly through bodily movement.`,
  body:[`This project was developed for IAT 320: Body as Interface, a course that explores how the human body can serve as an input medium for interactive systems. Through prototyping with Arduino, sensors, and creative coding, the course investigates embodied interaction and how movement, gesture, and physical sensation can be translated into meaningful digital experiences.`,
    `As part of this project, I was primarily responsible for developing the technical implementation that translated body movement into a real-time drawing experience. I worked on the Arduino and Processing code that captured motion data from the sensors and mapped those values to visual parameters such as line position, direction, and flow on the digital canvas. This involved refining the sensor input, adjusting how movement was interpreted, and experimenting with different mappings to create smooth and expressive drawings that responded naturally to the user's gestures. I also collaborated closely with my team during the concept pivot, helping transform the project from a functional light-and-sound prototype into a more artistic and embodied interaction. My contributions ensured that the final experience accurately reflected the user's movements and supported the project's goal of turning bodily motion into a form of visual expression.`],
  meta:{Year:"2026",Timeframe:"1 month",Tools:"Arduino, Circuits",Category:"Wearable Interaction"},
  link:null },

{ name:"The Uneven Wave", cat:"Frontend / Data Viz", color:"#CDB89A",
  tagline:`Designed an interactive website showcasing data visualizations created in Observable using Vega-Lite to explore AI usage across gaming, marketing, and media.`,
  hero:"TUW-1.png", gallery:["TUW-2.png","TUW-3.png","TUW-4.png"],
  problem:`Our initial presentation received feedback that the content was too text-heavy, which made it difficult for viewers to quickly identify the most important insights. In addition, some variables used in the visualizations were not clearly explained, causing confusion and reducing the overall effectiveness of the storytelling.`,
  solution:`To address this feedback, we refined the written content by reducing the amount of text and emphasizing key takeaways with bolded summary statements. We also clarified the visualizations by improving labels and making the variables easier to understand. To create a more engaging experience, we introduced scroll-based animations that gradually revealed content as users moved through the page, helping guide attention and making the information easier to follow.`,
  body:[`This project was created for IAT 355: Introduction to Visual Analytics, where we explored principles of effective data visualization by analyzing datasets, designing interactive charts, and presenting insights through a web-based storytelling experience.`,
    `For my role and contribution, I focused primarily on the website design and communication aspects of the project. I contributed to the ideation process by helping shape how the visualizations would be presented as a cohesive narrative, ensuring the layout, flow, and user experience of the site were clear and intuitive. I was also involved in the development process by implementing a micro-interaction that dynamically changes the background gradient as the user scrolls, adding a more engaging and polished experience. In addition, I worked on documentation by organizing our progress, refining written content, and clearly outlining our findings, limitations, and design decisions. During the presentation, I helped guide the walkthrough of the website, explaining the visualizations and insights directly through the interface and communicating the overall story in a clear and engaging way.`],
  meta:{Year:"2026",Timeframe:"2 months",Tools:"Observable, Github",Category:"Front-end / Data Visualization"},
  link:{label:"View the live site",url:"https://ceez23.github.io/IAT355_FinalProject_PopeyesSandwich/"} },
];

/* cursor */
(function(){const dot=document.getElementById('cursor');let x=innerWidth/2,y=innerHeight/2,tx=x,ty=y;
  addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY});
  (function l(){x+=(tx-x)*0.2;y+=(ty-y)*0.2;dot.style.transform=`translate(${x-7}px,${y-7}px)`;requestAnimationFrame(l)})();
  document.addEventListener('mouseover',e=>{if(e.target.closest('a,.sa,.linkbtn,.cta'))dot.classList.add('big')});
  document.addEventListener('mouseout',e=>{if(e.target.closest('a,.sa,.linkbtn,.cta'))dot.classList.remove('big')});})();

function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
const idx=clamp(parseInt(new URLSearchParams(location.search).get('p')||'0',10)||0,0,CASES.length-1);
const cameFrom=new URLSearchParams(location.search).get('from');   // 'car' = opened from the 3D carousel
const c=CASES[idx];
document.documentElement.style.setProperty('--accent',c.color);
document.title=c.name+" — VITHUN";

const linkHtml=c.link?`<a class="linkbtn" href="${c.link.url}" target="_blank" rel="noopener">${c.link.label} →</a>`:`<p style="color:#9a9a9a;font-size:14px">Full research available on request — <a style="color:var(--accent)" href="index.html#contact">get in touch</a>.</p>`;
const metaRows=Object.entries(c.meta).map(([k,v])=>`<div class="row"><span>${k}</span><b>${v}</b></div>`).join('');
const galleryHtml=`<div class="gstick"><div class="gcard">${c.gallery.map((g,i)=>`<div class="glayer" style="z-index:${i}"><img src="${g}" alt="${c.name} ${i+1}"></div>`).join('')}<span class="gnum" id="gnum">01</span></div></div>`;
const CARDIMGS=["tb1.png","VPMD.png","ZD.png","EOMD.png","TUVD.png"];
const others=CASES.map((o,i)=>({o,i})).filter(x=>x.i!==idx);
const seeAlso=others.map(({o,i})=>`<a class="sa" href="project.html?p=${i}"><img src="${CARDIMGS[i]}" alt="${o.name}"><div class="cap"><b>${o.name}</b><small>${o.cat}</small></div></a>`).join('');
const bodyHtml=c.body.map(p=>`<p>${p}</p>`).join('');

document.getElementById('app').innerHTML=`
<div class="wrap">
  <header class="hero">
    <a class="back" href="${cameFrom==='car'?'index.html#projects':'index.html#work-'+idx}">← back to work</a>
    <h1 style="color:${c.color}">${c.name}</h1>
    <p class="tagline">${c.tagline}</p>
  </header>
  <div class="heroimg"><img src="${c.hero}" alt="${c.name}"></div>
  <div class="grid">
    <div class="block reveal"><div class="lbl">Problem</div><p>${c.problem}</p></div>
    <div class="block reveal"><div class="lbl">Solution</div><p>${c.solution}</p></div>
  </div>
  <div class="overview reveal">
    <div class="body">${bodyHtml}${linkHtml}</div>
    <div class="meta">${metaRows}</div>
  </div>
  <div class="gallery" id="gallery">${galleryHtml}</div>
  <div class="seealso reveal"><h4>More work</h4><div class="row">${seeAlso}</div></div>
</div>
<div class="contact reveal"><p>Like what you see? Let's build something together.</p><a class="cta" href="index.html#contact">Get in touch →</a></div>`;
requestAnimationFrame(()=>document.body.classList.add('loaded'));

/* scroll: reveal sections (robust) + parallax the hero image & text */
let _revs=[...document.querySelectorAll('.reveal')];
function _onScroll(){   // scroll-reveal only — no hero drift (so nothing slides over the project name)
  for(let i=_revs.length-1;i>=0;i--){if(_revs[i].getBoundingClientRect().top<innerHeight*0.88){_revs[i].classList.add('inview');_revs.splice(i,1);}}
}
addEventListener('scroll',_onScroll,{passive:true});addEventListener('resize',_onScroll);_onScroll();

/* liquid gallery — melt from image 1 → 2 → 3 as the sticky card is scrolled through */
(function(){const gallery=document.getElementById('gallery');if(!gallery)return;
  const glayers=[...gallery.querySelectorAll('.glayer')],gnum=document.getElementById('gnum'),G=glayers.length;
  if(G<2)return;
  gallery.style.height=(G*90+10)+'vh';
  const sm=u=>{u=clamp(u,0,1);return u*u*(3-2*u)};
  function render(){const r=gallery.getBoundingClientRect(),range=gallery.offsetHeight-innerHeight;
    const p=range>0?clamp(-r.top/range,0,1):0;
    const raw=p*(G-1),base=Math.floor(raw+1e-6),frac=raw-base,H=0.5;let f=0;if(frac>H)f=sm((frac-H)/(1-H));
    glayers.forEach((el,i)=>{const rr=i<=base?150:(i===base+1?f*150:0);const cp=`circle(${rr}% at 50% 100%)`;el.style.clipPath=cp;el.style.webkitClipPath=cp;});
    const showIdx=clamp(f>0.5?base+1:base,0,G-1);gnum.textContent='0'+(showIdx+1);
  }
  addEventListener('scroll',render,{passive:true});addEventListener('resize',render);render();
})();

/* hamburger popup (matches homepage) */
(function(){const burger=document.getElementById('burger'),pop=document.getElementById('menuPop'),logo=document.getElementById('logo');
  const lf=document.createElement('div');lf.style.cssText='position:fixed;inset:0;background:#0a0a0a;opacity:0;transition:opacity .5s ease;z-index:600;pointer-events:none';document.body.appendChild(lf);
  function leave(url){lf.style.opacity='1';lf.style.pointerEvents='auto';setTimeout(()=>{location.href=url;},480);}
  function toggle(){const o=!pop.classList.contains('open');pop.classList.toggle('open',o);burger.classList.toggle('spin',o);}
  burger.addEventListener('click',e=>{e.stopPropagation();toggle();});
  logo.addEventListener('click',e=>{e.preventDefault();e.stopPropagation();leave('index.html#home');});
  document.addEventListener('click',e=>{const a=e.target.closest('a[href^="index.html"]');if(a){e.preventDefault();leave(a.getAttribute('href'));return;}
    if(pop.classList.contains('open')&&!e.target.closest('#menuPop')&&!e.target.closest('#burger')&&!e.target.closest('#logo')){pop.classList.remove('open');burger.classList.remove('spin');}});})();
</script>
</body>
